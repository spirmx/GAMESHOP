{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-[#0A0F16] border border-white/10 p-8 rounded-2xl shadow-2xl mt-10">
    <h2 class="text-3xl font-black text-white mb-6 text-center italic">WELCOME <span class="text-blue-500">BACK</span></h2>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-black uppercase text-slate-500 mb-2">Username</label>
            <input type="text" name="username" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-blue-500 outline-none transition">
        </div>
        <div>
            <label class="block text-xs font-black uppercase text-slate-500 mb-2">Password</label>
            <input type="password" name="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-blue-500 outline-none transition">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition shadow-lg shadow-blue-600/20">
            LOG IN
        </button>
    </form>
    <p class="text-center mt-6 text-sm text-slate-400">ยังไม่มีบัญชี? <a href="{% url 'signup' %}" class="text-blue-400 hover:underline">สมัครเลย</a></p>
</div>
{% endblock %}
