{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-[#0A0F16] border border-white/10 p-10 rounded-3xl shadow-2xl mt-10">
    <div class="text-center mb-10">
        <h2 class="text-4xl font-black text-white italic uppercase">JOIN THE <span class="text-blue-500">SHOP</span></h2>
        <p class="text-slate-500 mt-2 text-xs uppercase tracking-widest">สร้างบัญชีนักบิน เพื่อเริ่มสะสมไอเท็มระดับเทพ</p>
    </div>
    
    <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% csrf_token %}
        {% for field in form %}
        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        
        <div class="md:col-span-2 mt-4">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl uppercase transition shadow-lg shadow-blue-600/20">
                Initialize Account
            </button>
        </div>
    </form>

    <div class="relative my-8">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
        <div class="relative flex justify-center text-[10px] font-black uppercase tracking-widest"><span class="bg-[#0A0F16] px-4 text-slate-500">Or Demo Register</span></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button onclick="alert('DEMO: Google Register Service is offline for maintenance.')" 
                class="flex items-center justify-center bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold py-3.5 rounded-xl transition">
            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg> Google
        </button>
        <button onclick="alert('DEMO: Facebook Syncing... Please try again later.')" 
                class="flex items-center justify-center bg-[#1877F2]/10 hover:bg-[#1877F2]/20 border border-[#1877F2]/30 text-[#1877F2] font-bold py-3.5 rounded-xl transition">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg> Facebook
        </button>
    </div>

    <div class="mt-8 text-center text-sm text-slate-400">
        Already part of the fleet? <a href="{% url 'users:login' %}" class="text-blue-500 font-bold hover:underline">Log in</a>
    </div>
</div>
{% endblock %}
