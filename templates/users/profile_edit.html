{% extends 'base.html' %}
{% block content %}
<div class="max-w-[600px] mx-auto py-16 px-4">
    <div class="mb-10 text-center">
        <h1 class="text-4xl font-black text-white italic uppercase tracking-tighter">Edit <span class="text-blue-500">Pilot Info</span></h1>
        <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px] mt-2">จัดการข้อมูลการติดต่อของนักบิน</p>
    </div>

    <form method="POST" class="admin-card p-10 space-y-8 bg-[#161B26]/80 backdrop-blur-2xl">
        {% csrf_token %}
        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Email Address</label>
                <input type="email" name="email" value="{{ user.email }}" required class="w-full" placeholder="pilot@example.com">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Phone Number</label>
                <input type="text" name="phone" value="{{ user.profile.phone }}" required class="w-full" placeholder="09XXXXXXXX">
            </div>
        </div>

        <div class="pt-4 space-y-4">
            <button type="submit" class="btn-neon w-full py-4 text-sm tracking-[0.2em]">Save Changes</button>
            <a href="{% url 'profile' %}" class="block text-center text-[10px] text-slate-500 font-black uppercase hover:text-white transition">Cancel & Return</a>
        </div>
    </form>
</div>
{% endblock %}
