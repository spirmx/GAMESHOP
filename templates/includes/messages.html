{% if messages %}
<div class="max-w-[1800px] mx-auto px-4 mt-4 space-y-2">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show" 
         class="flex items-center justify-between p-4 rounded-2xl border backdrop-blur-xl animate-fade-in
                {% if message.tags == 'success' %} bg-green-500/10 border-green-500/20 text-green-400 
                {% elif message.tags == 'error' %} bg-red-500/10 border-red-500/20 text-red-400 
                {% else %} bg-blue-500/10 border-blue-500/20 text-blue-400 {% endif %}">
        <div class="flex items-center gap-3">
            <span class="font-black uppercase text-[10px] tracking-widest italic">[{{ message.tags }}]</span>
            <p class="text-sm font-bold">{{ message }}</p>
        </div>
        <button @click="show = false" class="hover:opacity-50 transition">✕</button>
    </div>
    {% endfor %}
</div>
{% endif %}
