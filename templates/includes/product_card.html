<div class="group relative bg-[#0A0F16] border border-white/5 rounded-3xl overflow-hidden hover:border-blue-500/50 transition-all duration-500 hover:-translate-y-2 shadow-2xl flex flex-col h-full">
    <div class="relative aspect-square overflow-hidden bg-gradient-to-b from-white/5 to-transparent p-4">
        {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.title }}" class="w-full h-full object-contain transform group-hover:scale-110 transition duration-700">
        {% endif %}
        
        <div class="absolute top-4 left-4 flex flex-col gap-2">
            {% if product.stock > 0 %}
                <span class="bg-green-500/10 text-green-500 text-[9px] font-black px-3 py-1 rounded-full border border-green-500/20 uppercase tracking-widest">In Stock</span>
            {% else %}
                <span class="bg-red-500/10 text-red-500 text-[9px] font-black px-3 py-1 rounded-full border border-red-500/20 uppercase tracking-widest">Out of Stock</span>
            {% endif %}
        </div>
    </div>

    <div class="p-6 flex-grow flex flex-col">
        <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-2">{{ product.category.name }}</p>
        <h3 class="text-lg font-bold text-white mb-4 line-clamp-2 min-h-[3.5rem] group-hover:text-blue-400 transition">{{ product.title }}</h3>
        
        <div class="flex items-end justify-between gap-4 mt-auto">
            <div>
                <p class="text-slate-500 text-[9px] font-black uppercase leading-none mb-1">Price</p>
                <p class="text-2xl font-black text-white italic">฿{{ product.price }}</p>
            </div>
            
            <form action="{% url 'cart:add_to_cart' product.id %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="w-12 h-12 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl flex items-center justify-center transition-all shadow-lg shadow-blue-600/20 active:scale-90 group-hover:rotate-6">
                    <span class="text-xl font-bold">+</span>
                </button>
            </form>
        </div>
    </div>
    <div class="absolute bottom-0 left-0 w-full h-1 bg-blue-600 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-500"></div>
</div>
