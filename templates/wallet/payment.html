{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="bg-[#0A0F16] border border-white/10 p-8 rounded-2xl">
        <h2 class="text-2xl font-black text-white mb-6 uppercase italic">ยืนยันการชำระเงิน</h2>
        <div class="space-y-4 border-b border-white/5 pb-6 mb-6">
            <div class="flex justify-between">
                <span class="text-slate-400">Order ID:</span>
                <span class="text-white font-bold">#{{ order.id }}</span>
            </div>
            <div class="flex justify-between text-xl">
                <span class="text-slate-400">ยอดชำระทั้งสิ้น:</span>
                <span class="text-blue-400 font-black">฿{{ order.total_price }}</span>
            </div>
        </div>
        
        <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl mb-6">
            <p class="text-sm text-blue-300 font-bold">ยอดเงินคงเหลือใน Wallet: ฿{{ wallet.balance }}</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="method" value="wallet">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition">
                ชำระเงินทันที
            </button>
        </form>
    </div>

    <div class="bg-white/5 p-8 rounded-2xl border border-dashed border-white/10 flex flex-col justify-center text-center">
        <p class="text-slate-500 italic text-sm">"ความปลอดภัยคือหัวใจของเรา ข้อมูลการชำระเงินของคุณจะถูกเข้ารหัสระดับสากล"</p>
    </div>
</div>
{% endblock %}
